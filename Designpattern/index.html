<!DOCTYPE html>
<html>
<head>
  <title>Lazy Load</title>
  <style>
    body { 
      background:black; 
      color:white; 
      text-align:center; 
      margin:0;
    }

    h1 {
      margin: 100px 0;
    }

    img { 
      width:100%;
      height:100vh;
      object-fit: cover;
      display:block;
    }
  </style>
</head>
<body>

  <h1>Lazy Loading Images</h1>

  <img class="lazy" data-src="https://picsum.photos/id/101/1200/800">
  <img class="lazy" data-src="https://picsum.photos/id/102/1200/800">
  <img class="lazy" data-src="https://picsum.photos/id/103/1200/800">
  <img class="lazy" data-src="https://picsum.photos/id/104/1200/800">

  <script src="script.js"></script>
</body>
</html>
